<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spidey Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 30px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }
    #score {
      color: #fff; font-size: 32px; font-weight: 700;
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 20px rgba(92,225,255,0.5);
    }
    #gameOver {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; text-align: center;
      display: none; z-index: 20; pointer-events: none;
    }
    #gameOver h1 {
      font-family: 'Orbitron', monospace; font-size: 48px;
      color: #ff3333; text-shadow: 0 0 30px rgba(255,50,50,0.6);
    }
    #gameOver p {
      font-family: 'Rajdhani', sans-serif; font-size: 22px;
      color: rgba(255,255,255,0.6); margin-top: 10px;
    }
    #gameOver .final-score { font-size: 28px; color: #5ce1ff; font-weight: 700; }
    #restartBtn {
      margin-top: 20px; padding: 12px 40px;
      background: rgba(92,225,255,0.15);
      border: 2px solid rgba(92,225,255,0.4); border-radius: 8px;
      color: #5ce1ff; font-family: 'Orbitron', monospace;
      font-size: 16px; cursor: pointer; pointer-events: auto;
      transition: all 0.2s;
    }
    #restartBtn:hover { background: rgba(92,225,255,0.25); border-color: #5ce1ff; }
    #controls {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-family: 'Rajdhani', sans-serif; font-size: 14px;
      z-index: 10; pointer-events: none; letter-spacing: 1px;
    }
    @media (max-width: 768px) {
      #score { font-size: 24px; }
      #gameOver h1 { font-size: 32px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hud"><div id="score">0</div></div>
  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Score: <span class="final-score" id="finalScore">0</span></p>
    <button id="restartBtn">RESTART</button>
  </div>
  <div id="controls">ARROWS: ← → SWITCH LANE &nbsp;·&nbsp; ↑ JUMP</div>

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── DOM ──
    const canvas = document.getElementById('gameCanvas');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    // ── Renderer ──
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x0a0a1a);

    // ── Scene ──
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.035);

    // ── Camera ──
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3.5, 6.5);
    camera.lookAt(0, HERO_BASE_Y, 4.8);

    // ── Lights ──
    const hemi = new THREE.HemisphereLight(0x87ceeb, 0x444444, 0.9);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffeedd, 0.9);
    sun.position.set(12, 6, -7);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 50;
    scene.add(sun);

    // ── World ──
    const WORLD_RADIUS = 26;
    const HERO_BASE_Y = 1.8;
    const LANE_VALUES = [-1, 0, 1]; // left, middle, right
    const PATH_ANGLES = [1.52, 1.57, 1.62];
    let rollingSpeed = 0.008;
    let heroRollingSpeed;
    let currentLane = 0; // index into LANE_VALUES
    let jumping = false;
    let bounceValue = 0.1;
    const GRAVITY = 0.005;
    let score = 0;
    let hasCollided = false;
    let clock = new THREE.Clock();
    let treeReleaseInterval = 0.5;
    let lastTreeRelease = 0;
    const treesInPath = [];
    const treesPool = [];
    const MAX_TREES_POOL = 15;

    // ── Spherical helper ──
    const sphericalHelper = new THREE.Spherical();

    // ── Build planet sphere ──
    function createWorld() {
      const sides = 40;
      const tiers = 30;
      const geo = new THREE.SphereGeometry(WORLD_RADIUS, sides, tiers);
      const pos = geo.attributes.position.array;
      const stride = sides + 1;

      // Deform vertices for terrain
      const maxHeight = 0.07;
      for (let j = 1; j < tiers - 1; j++) {
        for (let i = 0; i < sides; i++) {
          const idx = j * stride + i;
          const v = new THREE.Vector3(pos[idx * 3], pos[idx * 3 + 1], pos[idx * 3 + 2]);
          const next = new THREE.Vector3(
            pos[(j * stride + ((i + 1) % sides)) * 3],
            pos[(j * stride + ((i + 1) % sides)) * 3 + 1],
            pos[(j * stride + ((i + 1) % sides)) * 3 + 2]
          );
          if (j % 2 !== 0) {
            v.lerp(next, Math.random() * 0.5 + 0.25);
          }
          const height = (Math.random() - 0.5) * maxHeight;
          const offset = v.clone().normalize().multiplyScalar(height);
          v.add(offset);
          pos[idx * 3] = v.x; pos[idx * 3 + 1] = v.y; pos[idx * 3 + 2] = v.z;
        }
      }
      geo.computeVertexNormals();
      geo.attributes.position.needsUpdate = true;

      const mat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        roughness: 0.8,
        metalness: 0.2,
        flatShading: true,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.receiveShadow = true;
      mesh.rotation.z = -Math.PI / 2;
      mesh.position.y = -24;
      mesh.position.z = 2;
      scene.add(mesh);

      // Add neon grid lines on sphere
      const wireframe = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0x5ce1ff, transparent: true, opacity: 0.04 })
      );
      wireframe.rotation.z = -Math.PI / 2;
      wireframe.position.copy(mesh.position);
      scene.add(wireframe);

      return mesh;
    }

    // ── Trees (simple geometry) ──
    function createTree() {
      const treeMat = new THREE.MeshStandardMaterial({
        color: 0x33ff33,
        flatShading: true,
        emissive: 0x33ff33,
        emissiveIntensity: 0.05,
      });
      const top = new THREE.Mesh(
        new THREE.ConeGeometry(0.5, 1, 8),
        treeMat
      );
      top.castShadow = true;
      top.position.y = 0.9;
      top.rotation.y = Math.random() * Math.PI;

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.1, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x886633, flatShading: true })
      );
      trunk.position.y = 0.25;

      const tree = new THREE.Object3D();
      tree.add(trunk);
      tree.add(top);
      tree.visible = false;
      return tree;
    }

    function buildTreesPool() {
      for (let i = 0; i < MAX_TREES_POOL; i++) {
        const t = createTree();
        treesPool.push(t);
        scene.add(t);
      }
    }

    function addWorldTrees(world) {
      const count = 36;
      const gap = Math.PI * 2 / count;
      for (let i = 0; i < count; i++) {
        addTreeToWorld(world, i * gap, true);
        addTreeToWorld(world, i * gap, false);
      }
    }

    function addTreeToWorld(world, angle, isLeft) {
      const tree = createTree();
      tree.visible = true;
      const a = isLeft ? 1.68 + Math.random() * 0.1 : 1.46 - Math.random() * 0.1;
      sphericalHelper.set(WORLD_RADIUS - 0.3, a, angle);
      tree.position.setFromSpherical(sphericalHelper);
      const up = new THREE.Vector3(0, 1, 0);
      const tNorm = tree.position.clone().normalize();
      tree.quaternion.setFromUnitVectors(up, tNorm);
      tree.rotation.x += (Math.random() * 0.628) - 0.314;
      world.add(tree);
    }

    function addPathTree(world) {
      const options = [0, 1, 2];
      const lane = Math.floor(Math.random() * 3);
      releaseTree(world, lane);
      options.splice(lane, 1);
      if (Math.random() > 0.5) {
        releaseTree(world, options[Math.floor(Math.random() * 2)]);
      }
    }

    function releaseTree(world, laneIdx) {
      if (treesPool.length === 0) return;
      const tree = treesPool.pop();
      tree.visible = true;
      treesInPath.push(tree);
      sphericalHelper.set(WORLD_RADIUS - 0.3, PATH_ANGLES[laneIdx], -world.rotation.x + 4);
      tree.position.setFromSpherical(sphericalHelper);
      const up = new THREE.Vector3(0, 1, 0);
      const tNorm = tree.position.clone().normalize();
      tree.quaternion.setFromUnitVectors(up, tNorm);
      world.add(tree);
    }

    // ── Particles (explosion) ──
    const PARTICLE_COUNT = 20;
    const particleGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(PARTICLE_COUNT * 3);
    particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0x5ce1ff,
      size: 0.15,
      transparent: true,
      opacity: 0.8,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    particles.visible = false;
    scene.add(particles);
    let explosionPower = 1.06;

    function explode(posX) {
      const p = particles.geometry.attributes.position.array;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        p[i * 3] = -0.2 + Math.random() * 0.4;
        p[i * 3 + 1] = -0.2 + Math.random() * 0.4;
        p[i * 3 + 2] = -0.2 + Math.random() * 0.4;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.position.set(posX, 2, 4.8);
      explosionPower = 1.07;
      particles.visible = true;
    }

    // ── Spidey character ──
    let player = null;
    let playerReady = false;
    let mixer = null;
    let runAction = null;

    function loadPlayer() {
      const loader = new GLTFLoader();
      loader.load('/anim_spidey_idle.glb', (gltf) => {
        player = gltf.scene;
        player.scale.set(0.012, 0.012, 0.012);
        player.position.set(0, HERO_BASE_Y, 4.8);
        player.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
        scene.add(player);
        mixer = new THREE.AnimationMixer(player);
        if (gltf.animations && gltf.animations.length > 0) {
          runAction = mixer.clipAction(gltf.animations[0]);
          runAction.setLoop(THREE.LoopRepeat);
          runAction.play();
        }
        playerReady = true;
      }, undefined, () => {
        loader.load('/spidey_anim.glb', (gltf2) => {
          player = gltf2.scene;
          player.scale.set(0.012, 0.012, 0.012);
          player.position.set(0, HERO_BASE_Y, 4.8);
          player.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
          scene.add(player);
          mixer = new THREE.AnimationMixer(player);
          if (gltf2.animations && gltf2.animations.length > 0) {
            runAction = mixer.clipAction(gltf2.animations[0]);
            runAction.setLoop(THREE.LoopRepeat);
            runAction.play();
          }
          playerReady = true;
        });
      });
    }

    // ── Input ──
    document.addEventListener('keydown', (e) => {
      if (!playerReady || !player) return;
      if (jumping && e.keyCode !== 38) return;
      let valid = true;

      if (e.keyCode === 37) { // left
        if (currentLane === 1) currentLane = 0;
        else if (currentLane === 2) currentLane = 1;
        else valid = false;
      } else if (e.keyCode === 39) { // right
        if (currentLane === 1) currentLane = 2;
        else if (currentLane === 0) currentLane = 1;
        else valid = false;
      } else if (e.keyCode === 38) { // up
        bounceValue = 0.1;
        jumping = true;
        valid = false;
      } else {
        valid = false;
      }

      if (valid) {
        jumping = true;
        bounceValue = 0.06;
      }
    });

    restartBtn.addEventListener('click', restart);

    // ── Game logic ──
    function restart() {
      gameOverEl.style.display = 'none';
      hasCollided = false;
      score = 0;
      scoreEl.textContent = '0';
      rollingSpeed = 0.008;
      currentLane = 1;
      jumping = false;
      bounceValue = 0.1;
      clock.start();
      lastTreeRelease = 0;
      particles.visible = false;

      // Remove path trees and return to pool
      treesInPath.forEach(t => {
        t.visible = false;
        treesPool.push(t);
      });
      treesInPath.length = 0;

      if (player) player.position.x = 0;
    }

    function gameOver() {
      hasCollided = true;
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'block';
    }

    function doTreeLogic(world) {
      const treePos = new THREE.Vector3();
      const toRemove = [];

      treesInPath.forEach((tree, idx) => {
        treePos.setFromMatrixPosition(tree.matrixWorld);
        if (treePos.z > 6 && tree.visible) {
          toRemove.push(idx);
        } else if (player) {
          const dist = treePos.distanceTo(player.position);
          if (dist <= 0.6 && !hasCollided) {
            gameOver();
            explode(player.position.x);
          }
        }
      });

      for (let i = toRemove.length - 1; i >= 0; i--) {
        const t = treesInPath[toRemove[i]];
        t.visible = false;
        treesPool.push(t);
        treesInPath.splice(toRemove[i], 1);
      }
    }

    function update() {
      if (!playerReady) return;

      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      // Update player lane position smoothly
      if (player) {
        player.position.x = THREE.MathUtils.lerp(player.position.x, LANE_VALUES[currentLane], 2 * delta);
      }

      // Jump
      if (player && player.position.y <= HERO_BASE_Y) {
        jumping = false;
        bounceValue = Math.random() * 0.04 + 0.005;
      }
      if (player) {
        player.position.y += bounceValue;
        bounceValue -= GRAVITY;
      }

      // Rolling sphere rotates
      world.rotation.x += rollingSpeed;
      if (player) {
        player.rotation.x -= rollingSpeed * 0.5;
      }

      // Spawn trees
      if (elapsed > treeReleaseInterval && !hasCollided) {
        addPathTree(world);
        score += Math.round(2 * treeReleaseInterval);
        scoreEl.textContent = score;
        clock.start();
      }

      // Tree collision logic
      doTreeLogic(world);

      // Explosion particles
      if (particles.visible) {
        const p = particles.geometry.attributes.position.array;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          p[i * 3] *= explosionPower;
          p[i * 3 + 1] *= explosionPower;
          p[i * 3 + 2] *= explosionPower;
        }
        particles.geometry.attributes.position.needsUpdate = true;
        if (explosionPower > 1.005) {
          explosionPower -= 0.001;
        } else {
          particles.visible = false;
        }
      }

      // Animate mixer
      if (mixer) mixer.update(delta);

      renderer.render(scene, camera);
      requestAnimationFrame(update);
    }

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Init ──
    let world;
    function init() {
      world = createWorld();
      heroRollingSpeed = (rollingSpeed * WORLD_RADIUS / 1) / 5;
      clock.start();
      buildTreesPool();
      addWorldTrees(world);
      loadPlayer();
      update();
    }
    init();
  </script>
</body>
</html>
